# Keeps dependencies and GitHub Actions patched. Grouping minor/patch bumps
# keeps PR noise down; majors come through individually for manual review.
version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns: ['*']
