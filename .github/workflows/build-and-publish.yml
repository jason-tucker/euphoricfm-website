name: build-and-publish

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      # --ignore-scripts: don't run dependency lifecycle scripts in CI (matches
      # the Dockerfile build) so a malicious postinstall can't execute here.
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Astro check (typecheck)
        run: pnpm exec astro check
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          PUBLIC_GIT_SHA: ${{ github.sha }}
          PUBLIC_BUILD_TIME: ${{ github.event.head_commit.timestamp || github.run_started_at }}

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/euphoricfm-website
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PUBLIC_GIT_SHA=${{ github.sha }}
            PUBLIC_BUILD_TIME=${{ github.event.head_commit.timestamp || github.run_started_at }}
          cache-from: type=gha,scope=site
          cache-to: type=gha,mode=max,scope=site

  # Independent image for the tiny shared pending-requests Node service in
  # server/. No shared deps with the site build above, so the two jobs run
  # in parallel; separate GHA cache scope keeps the layers from colliding.
  build-requests:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/euphoricfm-website-requests
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=requests
          cache-to: type=gha,mode=max,scope=requests
