name: security

# Security gates that run on every push/PR to main and weekly. Kept separate
# from build-and-publish.yml so a scan failure never blocks the deploy image
# from building, and so this can run on a schedule for drift.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1' # Mondays 06:17 UTC
  workflow_dispatch:

# Least privilege at the top; individual jobs widen only what they need.
permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Unit + integration tests for the requests service -------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run server test suite
        run: node --test server/*.test.mjs

  # ---- Dependency vulnerability gate ---------------------------------------
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: pnpm audit (fail on High/Critical)
        run: pnpm audit --audit-level=high

  # ---- Static analysis (CodeQL) --------------------------------------------
  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@v3

  # ---- Secret scanning (gitleaks) ------------------------------------------
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history available; on PRs gitleaks scans the PR commits
      - uses: gitleaks/gitleaks-action@v2
        env:
          # Required by gitleaks-action v2 to scan pull requests via the API.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'

  # NOTE: actions/dependency-review-action needs the repo's Dependency Graph
  # feature enabled (Settings → Security → Dependency graph) and errors out
  # otherwise. Dependency-vuln risk is already gated by the `audit` job
  # (pnpm audit --audit-level=high) + Dependabot, so dependency-review is left
  # out until Dependency Graph is enabled — re-add it then for license/PR gating.

  # ---- Caddyfile validation (catches a broken proxy/CSP config pre-deploy) --
  caddy-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Caddyfile
        run: |
          docker run --rm -v "$PWD/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2.10-alpine caddy validate \
            --config /etc/caddy/Caddyfile --adapter caddyfile
