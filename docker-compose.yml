# euphoricfm-website — Docker Compose stack.
#
# As of 0.4.0 this is the PUBLIC ingress for info.euphoric.fm. Caddy binds
# 0.0.0.0:80 + 0.0.0.0:443 directly on the host (not via cloudflared) so the
# in-game phone iframe can reach us without Cloudflare's bot-detection layer
# silently rejecting CEF clients. Let's Encrypt handles certs automatically.
#
# Watchtower polls GHCR every 60s and auto-pulls a new ${IMAGE}:latest when
# CI pushes one — push to main → live in ~60-90s.

services:
  # Service renamed `web` → `efm-web` so this stack and `euphoric-tickets-web`
  # don't both auto-claim the unqualified `web` alias on shared efm-public-net.
  # Latent footgun otherwise — any future container on this net resolving plain
  # `web` would round-robin between two backends. Same failure shape as the
  # `db` collision on botpanel-net that bit otterbot's `/oc` in v0.10.3.
  efm-web:
    image: ${IMAGE:-ghcr.io/jason-tucker/euphoricfm-website:latest}
    build:
      context: .
      args:
        PUBLIC_GIT_SHA: ${GIT_SHA:-dev}
        PUBLIC_BUILD_TIME: ${BUILD_TIME:-unknown}
        PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://info.euphoric.fm}
    restart: unless-stopped
    environment:
      # Hostname Caddy serves (and provisions a Let's Encrypt cert for).
      SITE_HOSTNAME: ${SITE_HOSTNAME:-info.euphoric.fm}
      # Tickets hostnames — both the cloudflared-fronted .fm and the
      # direct-DNS .gg get served by the same reverse-proxy block in
      # Caddyfile. Either can be overridden via .env on the VPS.
      TICKETS_HOSTNAME: ${TICKETS_HOSTNAME:-tickets.euphoric.fm}
      TICKETS_GG_HOSTNAME: ${TICKETS_GG_HOSTNAME:-tickets.euphoric.gg}
      # Webhook URLs are injected at runtime by Caddy templating
      # /efm-runtime-config.js from these env vars. They live in .env on the
      # host; editing them is `docker compose up -d`, no rebuild needed.
      PUBLIC_DISCORD_REQUEST_WEBHOOK: ${PUBLIC_DISCORD_REQUEST_WEBHOOK:-}
      PUBLIC_DISCORD_CONTACT_WEBHOOK: ${PUBLIC_DISCORD_CONTACT_WEBHOOK:-}
    # PUBLIC binding: Caddy needs :80 (ACME HTTP-01 challenge + http→https
    # redirect) and :443 (TLS). HTTP/3 over UDP/443 is opt-in; we leave it
    # off because some CEF clients hang trying to negotiate QUIC.
    ports:
      - "80:80"
      - "443:443"
    # ---- Hardening ---------------------------------------------------------
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Required so the non-root caddy user inside the container can bind
      # to ports below 1024 (80, 443).
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=32m
    # Persist Let's Encrypt certs + ACME state across restarts/redeploys so
    # we don't burn LE rate limits on every container restart.
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    networks:
      # Default network for healthchecks; efm-public-net is the shared bridge
      # the Caddy uses to reverse_proxy to euphoric-tickets-web (tickets-web:3000).
      default: {}
      efm-public-net: {}
    healthcheck:
      # Hit Caddy's own loopback on 80 — succeeds even before LE cert is
      # provisioned (Caddy serves http→https redirect on 80 in the meantime).
      test: ["CMD", "wget", "-q", "--spider", "--tries=1", "--timeout=3", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # efm-requests — tiny shared pending-requests store (see server/index.mjs).
  # Caddy reverse-proxies /requests/* on info.euphoric.fm to this container so
  # every visitor sees every pending request (vs. the per-browser localStorage
  # state from v0.6.0). Reachable from efm-web on the default compose network
  # at `efm-requests:3000`. No host port binding — internal only.
  efm-requests:
    image: ${REQUESTS_IMAGE:-ghcr.io/jason-tucker/euphoricfm-website-requests:latest}
    build:
      context: ./server
    restart: unless-stopped
    environment:
      PORT: "3000"
      STORE_PATH: /data/pending.json
      # Override at runtime to point at a different AzuraCast instance for
      # the pruning poll. Default matches the public station shortcode.
      NOWPLAYING_URL: ${NOWPLAYING_URL:-https://euphoric.fm/api/nowplaying/euphoricfm}
    volumes:
      - efm_requests_data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=8m
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--tries=1", "--timeout=2", "http://127.0.0.1:3000/requests/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  watchtower:
    image: nickfedor/watchtower:latest
    restart: unless-stopped
    command:
      - --label-enable
      - --cleanup
      - --interval=60
      - --include-stopped
      - --revive-stopped
    environment:
      WATCHTOWER_NOTIFICATIONS_LEVEL: info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  # Shared bridge so this Caddy can reverse_proxy to the euphoric-tickets-web
  # container (`tickets-web:3000`). Create once on the host:
  #   docker network create efm-public-net
  efm-public-net:
    external: true

volumes:
  caddy_data:
  caddy_config:
  # Persistence for the pending-requests JSON store. Surviving redeploys
  # means a Watchtower restart doesn't wipe everyone's in-flight requests.
  efm_requests_data:
